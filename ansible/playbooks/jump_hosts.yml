---
- name: Configure jump hosts
  hosts: jump_hosts
  gather_facts: true
  become: true
  connection: amazon.aws.aws_ssm
  vars:
    ansible_aws_ssm_region: "{{ lookup('env', 'AWS_REGION') | default('us-east-1', true) }}"

  roles:
    - role: home_volume
    - role: base_hardening
    - role: user_accounts
      vars:
        user_accounts_users: "{{ users | default([]) }}"
        user_accounts_managed_user_uid_min: "{{ managed_user_uid_min | default(1000) }}"
        user_accounts_managed_user_exclusions: "{{ managed_user_exclusions | default(['ec2-user', 'ssm-user', 'nobody']) }}"
