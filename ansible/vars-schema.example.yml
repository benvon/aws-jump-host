---
# Example external user declaration schema.
#
# WARNING — sudo_profile: admin uses unrestricted passwordless root (NOPASSWD:ALL) by default.
# To migrate later, set role vars user_accounts_admin_use_unrestricted_sudo: false and
# user_accounts_admin_sudo_commands: [ '/usr/bin/somecmd', ... ] (see ansible/roles/user_accounts/defaults/main.yml).
users:
  - username: jumpops
    access_profile: ops
    # Optional: allowlist IAM roles that may start SSM sessions as this Linux user.
    iam_role_arns:
      - arn:aws:iam::123456789012:role/AWSReservedSSO_jumpops-access_aaaaaaaaaaaaaaaa
    groups:
      - ops
    sudo_profile: ops
    state: present
    shell: /bin/bash
    home: /home/jumpops

  # Example only: admin = full root on the bastion. Prefer ops profile + break-glass admin only if required.
  - username: platform-admin
    access_profile: ops
    iam_role_arns:
      - arn:aws:iam::123456789012:role/AWSReservedSSO_platform-admin-access_bbbbbbbbbbbbbbbb
    groups:
      - platform
    sudo_profile: admin
    state: present
