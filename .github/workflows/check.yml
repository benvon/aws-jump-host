name: check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CI setup
        uses: ./.github/actions/ci-setup

      - name: Full check (static + validation)
        env:
          SKIP_PREFLIGHT: "true"
        run: make check

      - name: Policy, contracts, shell, and Ansible tests
        run: make test
