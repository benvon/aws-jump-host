name: validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: CI setup
        uses: ./.github/actions/ci-setup

      - name: Format check
        run: make fmt-check

      - name: Lint
        run: make lint

      - name: Validate
        run: make validate
